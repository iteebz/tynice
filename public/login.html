<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>tynice</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
    <style>
        body {
            background:
              radial-gradient(circle at 30% 40%, rgba(170, 132, 95, 0.08), transparent 40%),
              radial-gradient(circle at 80% 70%, rgba(136, 105, 79, 0.05), transparent 40%),
              #faf8f5;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Crimson Pro', Georgia, serif;
            color: #2c2416;
            -webkit-font-smoothing: antialiased;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            width: 100%;
            max-width: 320px;
            padding: 1rem;
        }

        .logo {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 3.5rem;
            font-weight: 300;
            font-style: italic;
            text-align: center;
            letter-spacing: 0.08em;
            color: #5a4a3a;
            position: relative;
            padding-bottom: 1rem;
        }

        .logo::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 40%;
            height: 1px;
            background: linear-gradient(90deg, transparent, #c9bea8, transparent);
        }

        .hint {
            text-align: center;
            font-size: 0.95rem;
            color: #8b7355;
            letter-spacing: 0.03em;
        }

        input {
            padding: 0.9rem;
            border: none;
            border-bottom: 1px solid #c9bea8;
            background: transparent;
            text-align: center;
            font-size: 1.1rem;
            font-family: inherit;
            outline: none;
            color: #2c2416;
            transition: border-color 0.2s;
        }

        input::placeholder {
            color: #c9bea8;
            font-style: italic;
        }

        input:focus {
            border-color: #8b7355;
        }

        button {
            padding: 0.85rem;
            background: transparent;
            color: #5a4a3a;
            border: 1px solid #c9bea8;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.95rem;
            text-transform: lowercase;
            letter-spacing: 0.15em;
            transition: all 0.2s;
            margin-top: 0.25rem;
        }

        button:hover {
            border-color: #8b7355;
            color: #2c2416;
            background: rgba(255, 255, 255, 0.6);
        }

        .error {
            text-align: center;
            font-size: 0.85rem;
            color: #8b7355;
            font-style: italic;
        }
    </style>
</head>

<body>
    <form method="POST" action="/login">
        <div class="logo">tynice</div>
        <label for="password" class="hint">where did we get married?</label>
        <input type="text" name="password" id="password" placeholder="name the venue" autofocus autocomplete="off" autocapitalize="none" spellcheck="false">
        <button type="submit">enter</button>
        <p class="error" id="error-msg" role="alert" hidden>try again</p>
        <script>
            if (location.search.includes('error')) {
                document.getElementById('error-msg').hidden = false;
            }
        </script>
    </form>
</body>

</html>
