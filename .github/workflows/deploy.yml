name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npx wrangler pages deploy public/ --project-name tynice --commit-dirty=true
        env:
          CLOUDFLARE_ACCOUNT_ID: 5b1295e874631bb6d428fc7a75806e6e
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
